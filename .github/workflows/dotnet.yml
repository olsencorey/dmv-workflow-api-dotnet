name: .NET CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: '8.0.x'
      - name: Restore
        run: dotnet restore src/DmvWorkflow.Api/DmvWorkflow.Api.csproj
      - name: Build
        run: dotnet build src/DmvWorkflow.Api/DmvWorkflow.Api.csproj --no-restore --configuration Release
